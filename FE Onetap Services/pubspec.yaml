name: home_services
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  http: ^1.2.1
  socket_io_client: ^3.1.0
  shared_preferences: ^2.3.5
  intl: ^0.20.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo-1.png
    - assets/images/logo.png
    
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo-1.png"